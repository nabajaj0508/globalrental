<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Rental Properties</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: grid; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-blue-600 text-white text-center py-6 shadow-md">
        <h1 class="text-3xl font-bold">Global Property Rentals</h1>
        <p class="text-sm mt-1">Explore listings or post your own. Limit: 5 active user ads up to 24 hours.</p>
    </header>

    <div class="max-w-6xl mx-auto mt-8 px-4">
        <div class="flex flex-wrap justify-center space-x-2 border-b border-gray-300 pb-2">
            <button onclick="switchTab('india')" id="btn-india" class="tab-btn px-6 py-2.5 bg-blue-600 text-white rounded-t-lg font-medium shadow focus:outline-none transition">India</button>
            <button onclick="switchTab('usa')" id="btn-usa" class="tab-btn px-6 py-2.5 bg-white text-gray-700 hover:bg-gray-200 rounded-t-lg font-medium focus:outline-none transition">USA</button>
            <button onclick="switchTab('uk')" id="btn-uk" class="tab-btn px-6 py-2.5 bg-white text-gray-700 hover:bg-gray-200 rounded-t-lg font-medium focus:outline-none transition">UK</button>
            <button onclick="switchTab('canada')" id="btn-canada" class="tab-btn px-6 py-2.5 bg-white text-gray-700 hover:bg-gray-200 rounded-t-lg font-medium focus:outline-none transition">Canada</button>
            <button onclick="switchTab('uae')" id="btn-uae" class="tab-btn px-6 py-2.5 bg-white text-gray-700 hover:bg-gray-200 rounded-t-lg font-medium focus:outline-none transition">UAE</button>
        </div>

        <div id="india-cities-bar" class="flex flex-wrap justify-center gap-2 mt-4">
            <button onclick="filterIndiaCity('all')" id="btn-city-all" class="city-btn text-xs px-4 py-1.5 rounded-full font-semibold bg-gray-900 text-white shadow">All India</button>
            <button onclick="filterIndiaCity('Bangalore')" id="btn-city-Bangalore" class="city-btn text-xs px-4 py-1.5 rounded-full font-semibold bg-white text-gray-600 hover:bg-gray-200 transition">Bangalore</button>
            <button onclick="filterIndiaCity('Delhi')" id="btn-city-Delhi" class="city-btn text-xs px-4 py-1.5 rounded-full font-semibold bg-white text-gray-600 hover:bg-gray-200 transition">Delhi</button>
            <button onclick="filterIndiaCity('Chennai')" id="btn-city-Chennai" class="city-btn text-xs px-4 py-1.5 rounded-full font-semibold bg-white text-gray-600 hover:bg-gray-200 transition">Chennai</button>
            <button onclick="filterIndiaCity('Hyderabad')" id="btn-city-Hyderabad" class="city-btn text-xs px-4 py-1.5 rounded-full font-semibold bg-white text-gray-600 hover:bg-gray-200 transition">Hyderabad</button>
            <button onclick="filterIndiaCity('Pune')" id="btn-city-Pune" class="city-btn text-xs px-4 py-1.5 rounded-full font-semibold bg-white text-gray-600 hover:bg-gray-200 transition">Pune</button>
